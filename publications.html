<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publications | Lennox S. Keeble</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #101010;
      --text: #f4f7fb;
      --line: rgba(255, 255, 255, 0.18);
      --link: #f4f7fb;
      --link-hover: #f4f7fb;
      --active-nav: #5ca8ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    a {
      color: var(--link);
      text-decoration: none;
    }

    a:hover {
      color: var(--link-hover);
    }

    .site {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      border-bottom: 1px solid var(--line);
    }

    .topbar-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 22px 36px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
    }

    .site-name {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text);
      white-space: nowrap;
    }

    .nav {
      display: flex;
      gap: 28px;
      align-items: center;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.01em;
    }

    .nav a.active {
      color: var(--active-nav);
    }

    .page-content {
      flex: 1;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
      padding: 70px 36px 48px;
    }

    .message {
      max-width: 48ch;
      margin: 0;
      font-size: 1.45rem;
      line-height: 1.75;
      font-weight: 200;
      color: var(--text);
    }

    footer {
      border-top: 1px solid var(--line);
    }

    .footer-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 18px 36px 24px;
      text-align: center;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 200;
    }

    @media (max-width: 640px) {
      .topbar-inner,
      .page-content,
      .footer-inner {
        padding-left: 22px;
        padding-right: 22px;
      }

      .nav {
        gap: 18px;
        font-size: 1rem;
      }

      .message {
        font-size: 1.15rem;
      }
    }
  </style>
</head>
<body>
  <div class="site">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="site-name">Lennox S. Keeble</div>
        <nav class="nav" aria-label="Primary">
          <a href="index.html">About</a>
          <a class="active" href="publications.html">Publications</a>
        </nav>
      </div>
    </header>

    <main class="page-content">
      <p class="message">come back later!</p>
    </main>

    <footer>
      <div class="footer-inner">&copy; Lennox S. Keeble 2026</div>
    </footer>
  </div>
</body>
</html>
